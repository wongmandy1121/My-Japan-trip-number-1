<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Trip Pro</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #F0F9FF; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .sky-gradient { background: linear-gradient(135deg, #7DD3FC 0%, #0EA5E9 100%); color: white; }
        .floating-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; z-index: 100; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="app" class="max-w-[430px] mx-auto min-h-screen pb-32">
        
        <header class="p-6 flex justify-between items-center bg-white/50">
            <div>
                <h1 class="text-xl font-bold text-sky-900">Tokyo Sky Trip ✈️</h1>
                <p class="text-[10px] text-sky-500">1 JPY ≈ {{rate}} HKD</p>
            </div>
            <div class="flex gap-2">
                <input v-model.number="rate" type="number" step="0.001" class="w-16 text-xs bg-white rounded-lg px-2 py-1 border-none shadow-sm">
            </div>
        </header>

        <div class="no-scrollbar flex gap-3 px-6 overflow-x-auto py-4">
            <button @click="currentDay = -1" :class="currentDay === -1 ? 'bg-orange-400 text-white shadow-lg' : 'bg-white text-orange-400'" class="px-5 py-3 rounded-2xl flex-shrink-0 font-bold transition-all border border-orange-100">
                📝 行前
            </button>
            <button v-for="(d, i) in totalDays" :key="i" @click="currentDay = i" :class="currentDay === i ? 'bg-sky-500 text-white shadow-lg' : 'bg-white text-sky-500'" class="px-5 py-3 rounded-2xl flex-shrink-0 font-bold transition-all border border-sky-100 text-center">
                <span class="block text-[10px] opacity-70">Day {{i+1}}</span>
                <span>0{{8+i}}</span>
            </button>
        </div>

        <main class="px-5 space-y-6">
            
            <section v-if="currentDay === -1" class="animate-fadeIn">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-gray-800">行前準備清單</h2>
                    <button @click="addPreItem" class="text-xs bg-orange-100 text-orange-600 px-3 py-1 rounded-full font-bold">+ 新增</button>
                </div>
                <div class="space-y-3">
                    <div v-for="(item, i) in preTripList" :key="i" class="glass rounded-2xl p-4 flex items-center justify-between shadow-sm">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" v-model="item.done" class="w-5 h-5 rounded-lg border-orange-200">
                            <span :class="item.done ? 'line-through text-gray-400' : 'text-gray-700 font-medium'">{{item.title}}</span>
                        </div>
                        <i @click="removePreItem(i)" class="fa-solid fa-trash text-gray-200 text-xs"></i>
                    </div>
                </div>
            </section>

            <section v-if="activeTab === 'plan' && currentDay >= 0" class="space-y-4 animate-fadeIn">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold text-sky-900">Day {{currentDay+1}} 行程安排</h2>
                    <button @click="addDayPlan" class="bg-sky-500 text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-md">+ 新增</button>
                </div>
                <div v-if="!dailyPlans[currentDay]?.length" class="text-center py-10 text-gray-400 text-sm italic">今日暫時未有行程</div>
                <div v-for="(p, i) in dailyPlans[currentDay]" :key="i" class="glass rounded-[24px] p-5 flex gap-4 shadow-sm border-l-4 border-l-sky-400">
                    <div class="w-12 text-center border-r border-sky-100 flex-shrink-0">
                        <p class="font-bold text-sky-700">{{p.time}}</p>
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800">{{p.title}}</h3>
                        <p class="text-[10px] text-sky-400 mb-2"><i class="fa-solid fa-location-dot"></i> {{p.location}}</p>
                        <button @click="openMap(p.location)" class="text-[9px] bg-sky-50 text-sky-600 px-2 py-0.5 rounded border border-sky-100">開啟地圖</button>
                    </div>
                    <i @click="removeDayPlan(i)" class="fa-solid fa-xmark text-gray-300"></i>
                </div>
            </section>

            <section v-if="activeTab === 'money'" class="space-y-4">
                <div class="sky-gradient rounded-[32px] p-8 text-center shadow-xl relative overflow-hidden">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full"></div>
                    <p class="text-xs opacity-90 mb-2">總預算進度 (HKD)</p>
                    <h2 class="text-4xl font-bold">$ {{totalHKD}}</h2>
                </div>
                <div class="glass rounded-[24px] p-5 space-y-3">
                    <input v-model="newExp.item" placeholder="支出項目" class="w-full p-3 rounded-xl bg-white border-none text-sm shadow-sm">
                    <div class="flex gap-2">
                        <input v-model.number="newExp.amount" type="number" placeholder="日幣 ¥" class="flex-1 p-3 rounded-xl bg-white border-none text-sm shadow-sm">
                        <button @click="addExp" class="bg-sky-600 text-white px-6 rounded-xl font-bold shadow-lg">記帳</button>
                    </div>
                </div>
                <div v-for="(exp, i) in expenses" :key="i" class="bg-white/60 p-4 rounded-2xl flex justify-between items-center">
                    <span class="text-sm font-medium">{{exp.item}}</span>
                    <span class="text-sky-600 font-bold">$ {{(exp.amount * rate).toFixed(0)}}</span>
                </div>
            </section>

            <section v-if="activeTab === 'shop'" class="space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold text-gray-800">想買清單</h2>
                    <label class="bg-sky-500 text-white px-4 py-1.5 rounded-full text-xs font-bold cursor-pointer shadow-md">
                        + 新增圖片
                        <input type="file" @change="uploadShopImage" class="hidden" accept="image/*">
                    </label>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div v-for="(item, i) in shopItems" :key="i" class="bg-white rounded-[24px] p-3 shadow-sm relative overflow-hidden">
                        <div class="w-full h-32 bg-gray-100 rounded-[18px] mb-2 overflow-hidden border border-gray-50">
                            <img :src="item.img" v-if="item.img" class="w-full h-full object-cover">
                            <div v-else class="w-full h-full flex items-center justify-center text-gray-300 text-2xl"><i class="fa-solid fa-camera"></i></div>
                        </div>
                        <h4 class="text-[11px] font-bold text-gray-700 truncate px-1">{{item.name}}</h4>
                        <i @click="removeShopItem(i)" class="fa-solid fa-circle-xmark absolute top-1 right-1 text-red-400 bg-white rounded-full"></i>
                    </div>
                </div>
            </section>

        </main>

        <nav class="floating-nav glass rounded-[35px] flex items-center justify-around h-16 shadow-2xl px-2">
            <button @click="activeTab = 'plan'" :class="activeTab === 'plan' ? 'text-sky-600' : 'text-gray-400'" class="flex flex-col items-center">
                <i class="fa-solid fa-calendar-day"></i><span class="text-[10px] mt-1">行程</span>
            </button>
            <button @click="activeTab = 'money'" :class="activeTab === 'money' ? 'text-sky-600' : 'text-gray-400'" class="flex flex-col items-center">
                <i class="fa-solid fa-wallet"></i><span class="text-[10px] mt-1">記帳</span>
            </button>
            <button @click="activeTab = 'shop'" :class="activeTab === 'shop' ? 'text-sky-600' : 'text-gray-400'" class="flex flex-col items-center">
                <i class="fa-solid fa-bag-shopping"></i><span class="text-[10px] mt-1">購物</span>
            </button>
        </nav>
    </div>

    <script>
        const { createApp, ref, computed, watch, onMounted } = Vue
        createApp({
            setup() {
                const activeTab = ref('plan')
                const currentDay = ref(-1) // -1 代表「行前事項」
                const totalDays = 5
                const rate = ref(0.052)
                
                // 資料結構升級
                const preTripList = ref([]) // 行前事項
                const dailyPlans = ref({}) // 每日行程：{0: [], 1: [], ...}
                const shopItems = ref([])
                const expenses = ref([])
                const newExp = ref({ item: '', amount: null })

                onMounted(() => {
                    const savedData = localStorage.getItem('skyTrip_v3')
                    if (savedData) {
                        const parsed = JSON.parse(savedData)
                        preTripList.value = parsed.preTripList || []
                        dailyPlans.value = parsed.dailyPlans || {}
                        shopItems.value = parsed.shopItems || []
                        expenses.value = parsed.expenses || []
                        rate.value = parsed.rate || 0.052
                    }
                })

                watch([preTripList, dailyPlans, shopItems, expenses, rate], () => {
                    const data = {
                        preTripList: preTripList.value,
                        dailyPlans: dailyPlans.value,
                        shopItems: shopItems.value,
                        expenses: expenses.value,
                        rate: rate.value
                    }
                    localStorage.setItem('skyTrip_v3', JSON.stringify(data))
                }, { deep: true })

                // 功能函數
                const addPreItem = () => {
                    const title = prompt("準備做咩？(如: 買旅遊保險)")
                    if (title) preTripList.value.push({ title, done: false })
                }
                const removePreItem = (i) => preTripList.value.splice(i, 1)

                const addDayPlan = () => {
                    const title = prompt("景點名稱？")
                    if (title) {
                        if (!dailyPlans.value[currentDay.value]) dailyPlans.value[currentDay.value] = []
                        dailyPlans.value[currentDay.value].push({
                            time: prompt("時間？ (如 10:00)") || '12:00',
                            title,
                            location: prompt("地點？") || title
                        })
                        dailyPlans.value[currentDay.value].sort((a,b) => a.time.localeCompare(b.time))
                    }
                }
                const removeDayPlan = (i) => dailyPlans.value[currentDay.value].splice(i, 1)

                const uploadShopImage = (event) => {
                    const file = event.target.files[0]
                    const name = prompt("物品名稱？") || '未命名'
                    if (file) {
                        const reader = new FileReader()
                        reader.onload = (e) => {
                            shopItems.value.push({ name, img: e.target.result })
                        }
                        reader.readAsDataURL(file)
                    }
                }
                const removeShopItem = (i) => shopItems.value.splice(i, 1)

                const addExp = () => {
                    if (newExp.value.item && newExp.value.amount) {
                        expenses.value.unshift({...newExp.value})
                        newExp.value = { item: '', amount: null }
                    }
                }
                const totalHKD = computed(() => expenses.value.reduce((s, e) => s + (e.amount * rate.value), 0).toFixed(0))
                const openMap = (loc) => window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc)}`, '_blank')

                return { 
                    activeTab, currentDay, totalDays, rate, preTripList, dailyPlans, shopItems, expenses, newExp,
                    addPreItem, removePreItem, addDayPlan, removeDayPlan, uploadShopImage, removeShopItem, addExp, totalHKD, openMap
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
